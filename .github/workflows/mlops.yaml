name: MLOps Workflow

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install flake8
      - run: flake8 .

  build-test-train:
    runs-on: ubuntu-latest
    env:
      MLFLOW_TRACKING_URI: file:./mlruns
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Preprocess data
        run: PYTHONPATH=src python src/data_preprocessing.py
      - name: Engineer features
        run: PYTHONPATH=src python src/feature_engineering.py
      - name: Run tests
        run: PYTHONPATH=src pytest
      - name: Train model
        run: PYTHONPATH=src python src/model_training.py
      - name: Upload run_id artifact
        uses: actions/upload-artifact@v4
        with:
          name: run-id
          path: run_id.txt
      - name: Upload models
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: models/
      - name: Upload mlruns artifact
        uses: actions/upload-artifact@v4
        with:
          name: mlruns
          path: mlruns/
      - name: Evaluate model
        run: PYTHONPATH=src python src/model_evaluation.py

  model-register:
    runs-on: ubuntu-latest
    needs: build-test-train
    env:
      MLFLOW_TRACKING_URI: file:./mlruns
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Download run_id artifact
        uses: actions/download-artifact@v4
        with:
          name: run-id
          path: .
      - name: Download mlruns artifact
        uses: actions/download-artifact@v4
        with:
          name: mlruns
          path: mlruns/
      - run: pip install -r requirements.txt
      - name: Register Model in MLflow
        run: |
          RUN_ID=$(cat run_id.txt)
          export RUN_ID
          PYTHONPATH=src python src/model_register.py
      - name: Upload mlruns artifact (post-registration)
        uses: actions/upload-artifact@v4
        with:
          name: mlruns_registered
          path: mlruns/

  deploy:
    runs-on: ubuntu-latest
    needs: model-register
    env:
      MLFLOW_TRACKING_URI: file:./mlruns
      # `mlflow models serve` refuses the file-store backend by default as of
      # MLflow 3.x; we're intentionally keeping the file store (no new
      # tracking infra), so opt back in.
      MLFLOW_ALLOW_FILE_STORE: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Download mlruns artifact
        uses: actions/download-artifact@v4
        with:
          name: mlruns_registered
          path: mlruns/
      - name: Download run_id artifact
        uses: actions/download-artifact@v4
        with:
          name: run-id
          path: .
      - name: Download trained model artifact
        uses: actions/download-artifact@v4
        with:
          name: trained-model
          path: models/
      - run: pip install mlflow[extras]
      - name: Serve, smoke-test, and tear down the MLflow model
        run: |
          RUN_ID=$(cat run_id.txt)
          mlflow models serve -m "runs:/$RUN_ID/model" --no-conda -p 5000 --env-manager local > mlflow_serve.log 2>&1 &
          SERVER_PID=$!

          echo "Waiting for MLflow model server to become healthy..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5000/ping > /dev/null; then
              echo "Server is up."
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "Server failed to start within the timeout."
              cat mlflow_serve.log
              kill "$SERVER_PID" 2>/dev/null || true
              exit 1
            fi
            sleep 2
          done

          python3 -c "import json; columns = json.load(open('models/feature_columns.json')); json.dump({'dataframe_split': {'columns': columns, 'data': [[0] * len(columns)]}}, open('payload.json', 'w'))"

          echo "Sending sample prediction request..."
          curl -sf -X POST http://localhost:5000/invocations \
            -H "Content-Type: application/json" \
            -d @payload.json | python -c "import json, sys; body = json.load(sys.stdin); assert 'predictions' in body, body; print('Prediction OK:', body)"

          kill "$SERVER_PID"

  docker-verify:
    runs-on: ubuntu-latest
    needs: build-test-train
    steps:
      - uses: actions/checkout@v4
      - name: Download trained model artifact
        uses: actions/download-artifact@v4
        with:
          name: trained-model
          path: models/
      - name: Build Docker image
        run: docker build -t churn-api .
      - name: Run container
        run: docker run -d -p 8000:8000 --name churn-api churn-api
      - name: Wait for API to become healthy
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null; then
              echo "API is up."
              break
            fi
            if [ "$i" -eq 30 ]; then
              echo "API failed to start within the timeout."
              docker logs churn-api
              exit 1
            fi
            sleep 2
          done
      - name: Send sample prediction request
        run: |
          curl -sf -X POST http://localhost:8000/predict \
            -H "Content-Type: application/json" \
            -d '{
              "gender": "Male", "SeniorCitizen": 0, "Partner": "Yes", "Dependents": "No",
              "tenure": 24, "PhoneService": "Yes", "MultipleLines": "No",
              "InternetService": "Fiber optic", "OnlineSecurity": "No", "OnlineBackup": "Yes",
              "DeviceProtection": "Yes", "TechSupport": "No", "StreamingTV": "Yes",
              "StreamingMovies": "Yes", "Contract": "One year", "PaperlessBilling": "Yes",
              "PaymentMethod": "Electronic check", "MonthlyCharges": 70.0, "TotalCharges": 1680.0
            }' | python3 -c "import json, sys; body = json.load(sys.stdin); assert 'churn_prediction' in body, body; print('Prediction OK:', body)"
      - name: Tear down container
        if: always()
        run: docker rm -f churn-api || true
